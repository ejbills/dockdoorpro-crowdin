name: Pull Localizable From DockDoorPro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull-localizable:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Crowdin repo
        uses: actions/checkout@v4
        with:
          path: crowdin
          token: ${{ secrets.DOCKDOORPRO_SYNC_TOKEN }}

      - name: Checkout DockDoorPro repo
        uses: actions/checkout@v4
        with:
          repository: ejbills/DockDoorPro
          token: ${{ secrets.DOCKDOORPRO_SYNC_TOKEN }}
          path: DockDoorPro

      - name: Copy Localizable file
        run: cp DockDoorPro/Localizable.xcstrings crowdin/Localizable.xcstrings

      - name: Commit and push if changed
        working-directory: crowdin
        run: |
          if git diff --quiet -- Localizable.xcstrings; then
            echo "Localizable.xcstrings is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Localizable.xcstrings
          git commit -m "Sync Localizable.xcstrings from DockDoorPro"
          git push
